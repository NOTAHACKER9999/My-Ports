<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content=
<base href="https://cdn.jsdelivr.net/gh/NOTAHACKER9999/My-Ports@main/Cold%20Pines/""width=device-width, user-scalable=no, initial-scale=1.0">
<title>Cold Pines</title>
<style>
html, body, #canvas { margin:0; padding:0; border:0; }
body { color:white; background:black; overflow:hidden; touch-action:none; }
#canvas { display:block; }
#canvas:focus { outline:none; }
#status, #status-splash, #status-progress { position:absolute; left:0; right:0; }
#status, #status-splash { top:0; bottom:0; }
#status { background:#242424; display:flex; flex-direction:column; justify-content:center; align-items:center; visibility:hidden; }
#status-splash { max-height:100%; max-width:100%; margin:auto; }
#status-splash.show-image--false { display:none; }
#status-splash.fullsize--true { height:100%; width:100%; object-fit:contain; }
#status-splash.use-filter--false { image-rendering: pixelated; }
#status-progress, #status-notice { display:none; }
#status-progress { bottom:10%; width:50%; margin:0 auto; }
#status-notice { background-color:#5b3943; border-radius:0.5rem; border:1px solid #9b3943; color:#e0e0e0; font-family:'Noto Sans','Droid Sans',Arial,sans-serif; line-height:1.3; margin:0 2rem; overflow:hidden; padding:1rem; text-align:center; z-index:1; }
</style>
<link rel="icon" type="image/png" href="Cold Pines.icon.png" />
<link rel="apple-touch-icon" href="Cold Pines.apple-touch-icon.png"/>
</head>
<body>
<canvas id="canvas">Your browser does not support the canvas tag.</canvas>

<div id="status">
<img id="status-splash" class="show-image--true fullsize--true use-filter--true" src="Cold Pines.png" alt="">
<progress id="status-progress"></progress>
<div id="status-notice"></div>
</div>

<script src="Cold Pines.js"></script>

<!-- WASM + PCK fetch override -->
<script>
(() => {
    const originalFetch = window.fetch;

    window.fetch = async function(input, init) {
        if (typeof input === 'string') {
            // Merge WASM
            if (input.endsWith('Cold Pines.wasm')) {
                try {
                    const part1 = await originalFetch('Cold Pines.wasm.part1').then(r => r.arrayBuffer());
                    const part2 = await originalFetch('Cold Pines.wasm.part2').then(r => r.arrayBuffer());
                    const merged = new Uint8Array(part1.byteLength + part2.byteLength);
                    merged.set(new Uint8Array(part1), 0);
                    merged.set(new Uint8Array(part2), part1.byteLength);
                    return new Response(merged.buffer, {
                        status: 200,
                        statusText: 'OK',
                        headers: { 'Content-Type': 'application/wasm' }
                    });
                } catch(e) { console.error('Failed merging WASM parts:', e); throw e; }
            }

            // Merge PCK
            if (input.endsWith('Cold Pines.pck')) {
                try {
                    const partUrls = [
                        'Cold Pines.pck.part1',
                        'Cold Pines.pck.part2',
                        'Cold Pines.pck.part3',
                        'Cold Pines.pck.part4',
                        'Cold Pines.pck.part5'
                    ];
                    const buffers = await Promise.all(partUrls.map(url => originalFetch(url).then(r => r.arrayBuffer())));
                    const totalLength = buffers.reduce((sum,b)=>sum+b.byteLength,0);
                    const merged = new Uint8Array(totalLength);
                    let offset = 0;
                    for (const buf of buffers) {
                        merged.set(new Uint8Array(buf), offset);
                        offset += buf.byteLength;
                    }
                    return new Response(merged.buffer, {
                        status: 200,
                        statusText: 'OK',
                        headers: { 'Content-Type': 'application/octet-stream' }
                    });
                } catch(e) { console.error('Failed merging PCK parts:', e); throw e; }
            }
        }
        return originalFetch(input, init);
    };
})();
</script>

<script>
const GODOT_CONFIG = {
    "args":[],
    "canvasResizePolicy":2,
    "emscriptenPoolSize":8,
    "ensureCrossOriginIsolationHeaders":true,
    "executable":"Cold Pines",
    "experimentalVK":false,
    "fileSizes":{"Cold Pines.pck":86253392,"Cold Pines.wasm":37685705},
    "focusCanvas":true,
    "gdextensionLibs":[],
    "godotPoolSize":4
};
const GODOT_THREADS_ENABLED = false;
const engine = new Engine(GODOT_CONFIG);

(function () {
    const statusOverlay = document.getElementById('status');
    const statusProgress = document.getElementById('status-progress');
    const statusNotice = document.getElementById('status-notice');

    let initializing = true;
    let statusMode = '';

    function setStatusMode(mode) {
        if (statusMode === mode || !initializing) return;
        if (mode === 'hidden') { statusOverlay.remove(); initializing=false; return; }
        statusOverlay.style.visibility = 'visible';
        statusProgress.style.display = mode === 'progress' ? 'block':'none';
        statusNotice.style.display = mode === 'notice' ? 'block':'none';
        statusMode = mode;
    }

    function setStatusNotice(text) {
        while (statusNotice.lastChild) statusNotice.removeChild(statusNotice.lastChild);
        text.split('\n').forEach(line => {
            statusNotice.appendChild(document.createTextNode(line));
            statusNotice.appendChild(document.createElement('br'));
        });
    }

    function displayFailureNotice(err) {
        console.error(err);
        if (err instanceof Error) setStatusNotice(err.message);
        else if (typeof err==='string') setStatusNotice(err);
        else setStatusNotice('An unknown error occurred.');
        setStatusMode('notice');
        initializing=false;
    }

    const missing = Engine.getMissingFeatures({threads:GODOT_THREADS_ENABLED});
    if (missing.length!==0) {
        const missingMsg='Error\nThe following features required to run Godot projects on the Web are missing:\n';
        displayFailureNotice(missingMsg + missing.join('\n'));
    } else {
        setStatusMode('progress');
        engine.startGame({
            'onProgress': function(current,total){
                if(current>0 && total>0){ statusProgress.value=current; statusProgress.max=total; }
                else { statusProgress.removeAttribute('value'); statusProgress.removeAttribute('max'); }
            },
        }).then(()=>{ setStatusMode('hidden'); }, displayFailureNotice);
    }
}());
</script>

</body>
</html>
