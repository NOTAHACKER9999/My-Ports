<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
<title>SCP: Refinarium</title>
<base href="https://cdn.jsdelivr.net/gh/NOTAHACKER9999/My-Ports@main/SCP: Refinarium/">
<style>
html, body, #canvas { margin:0; padding:0; border:0; }
body { color:white; background:black; overflow:hidden; touch-action:none; }
#canvas { display:block; }
#canvas:focus { outline:none; }

#status,#status-splash,#status-progress { position:absolute; left:0; right:0; }
#status,#status-splash { top:0; bottom:0; }
#status { background:#000; display:flex; flex-direction:column; justify-content:center; align-items:center; visibility:hidden; }
#status-splash { max-height:100%; max-width:100%; margin:auto; }
#status-splash.show-image--false { display:none; }
#status-splash.fullsize--true { height:100%; width:100%; object-fit:contain; }
#status-splash.use-filter--false { image-rendering:pixelated; }
#status-progress,#status-notice { display:none; }
#status-progress { bottom:10%; width:50%; margin:0 auto; }
#status-notice { background:#5b3943; border-radius:.5rem; border:1px solid #9b3943; color:#e0e0e0; font-family:'Noto Sans','Droid Sans',Arial,sans-serif; line-height:1.3; margin:0 2rem; overflow:hidden; padding:1rem; text-align:center; z-index:1; }
</style>

<link rel="icon" type="image/png" href="scpr.icon.png">
<link rel="apple-touch-icon" href="scpr.apple-touch-icon.png">
</head>

<body>

<canvas id="canvas">Your browser does not support the canvas tag.</canvas>

<noscript>Your browser does not support JavaScript.</noscript>

<div id="status">
<img id="status-splash" class="show-image--false fullsize--true use-filter--true" src="scpr.png" alt="">
<progress id="status-progress"></progress>
<div id="status-notice"></div>
</div>

<script>
// Disable streaming for merged WASM
WebAssembly.instantiateStreaming = undefined;

const originalFetch = window.fetch;

window.fetch = async function(resource, options) {
	const url = typeof resource === "string" ? resource : resource.url;

	// Merge WASM parts
	if (url.endsWith("scpr.wasm")) {
		const parts = ["scpr.wasm.part1", "scpr.wasm.part2"];
		const buffers = [];
		for (const part of parts) {
			const res = await originalFetch(part);
			buffers.push(await res.arrayBuffer());
		}
		const totalLength = buffers.reduce((a,b)=>a+b.byteLength,0);
		const merged = new Uint8Array(totalLength);
		let offset=0;
		for (const buf of buffers) { merged.set(new Uint8Array(buf), offset); offset+=buf.byteLength; }
		return new Response(merged.buffer,{ headers:{"Content-Type":"application/wasm"} });
	}

	// Merge PCK parts
	if (url.endsWith("scpr.pck")) {
		const parts = ["scpr.pck.part1","scpr.pck.part2","scpr.pck.part3"];
		const buffers = [];
		for (const part of parts) {
			const res = await originalFetch(part);
			buffers.push(await res.arrayBuffer());
		}
		const totalLength = buffers.reduce((a,b)=>a+b.byteLength,0);
		const merged = new Uint8Array(totalLength);
		let offset=0;
		for (const buf of buffers) { merged.set(new Uint8Array(buf), offset); offset+=buf.byteLength; }
		return new Response(merged.buffer,{ headers:{"Content-Type":"application/octet-stream"} });
	}

	return originalFetch(resource, options);
};
</script>

<script src="scpr.js"></script>

<script>
const GODOT_CONFIG = {
	args: [],
	canvasResizePolicy: 2,
	emscriptenPoolSize: 8,
	ensureCrossOriginIsolationHeaders: true,
	executable: "scpr",
	experimentalVK: false,
	fileSizes: { "scpr.pck":58479008, "scpr.wasm":37685705 },
	focusCanvas:true,
	gdextensionLibs:[],
	godotPoolSize:4
};

const GODOT_THREADS_ENABLED = false;
const engine = new Engine(GODOT_CONFIG);

(function() {
	const statusOverlay = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const statusNotice = document.getElementById('status-notice');

	let initializing = true;
	let statusMode = '';

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) return;
		if (mode==='hidden') { statusOverlay.remove(); initializing=false; return; }
		statusOverlay.style.visibility='visible';
		statusProgress.style.display = mode==='progress'?'block':'none';
		statusNotice.style.display = mode==='notice'?'block':'none';
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while(statusNotice.lastChild) statusNotice.removeChild(statusNotice.lastChild);
		text.split('\n').forEach(line=>{
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err) {
		console.error(err);
		if(err instanceof Error) setStatusNotice(err.message);
		else if(typeof err==='string') setStatusNotice(err);
		else setStatusNotice('An unknown error occurred.');
		setStatusMode('notice');
		initializing=false;
	}

	const missing = Engine.getMissingFeatures({ threads: GODOT_THREADS_ENABLED });
	if (missing.length!==0) displayFailureNotice('Error\nThe following features required to run Godot projects on the Web are missing:\n'+missing.join('\n'));
	else {
		setStatusMode('progress');
		engine.startGame({ onProgress:(current,total)=>{
			if(current>0 && total>0){ statusProgress.value=current; statusProgress.max=total; }
			else { statusProgress.removeAttribute('value'); statusProgress.removeAttribute('max'); }
		}}).then(()=>setStatusMode('hidden'), displayFailureNotice);
	}
})();
</script>

</body>
</html>
